services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: isaf
      POSTGRES_PASSWORD: isaf
      POSTGRES_DB: isaf_horarios
    ports:
      - "5432:5432"
    volumes:
      - isaf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isaf -d isaf_horarios"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  isaf_pgdata:
